<div class="flex flex-1 flex-col items-center justify-start w-full h-full p-2 sm:p-6 bg-gradient-to-br from-gray-50 via-gray-100 to-gray-50 overflow-auto">

  <h2 class="text-2xl sm:text-3xl font-extrabold text-indigo-600 mb-2 text-center tracking-tight">
    Update Student
  </h2>

  <form #studentForm="ngForm" (ngSubmit)="onSubmit(studentForm.value)" class="w-full max-w-4xl bg-white/95 backdrop-blur-md rounded-2xl shadow-xl border border-gray-100 p-2 sm:p-8 grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-6">

    <!-- Registration Number -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Registration No</label>
      <input type="text" name="regNo" [(ngModel)]="student.regNo" readonly
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-100 cursor-not-allowed transition" />
    </div>

    <!-- Roll Number -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Roll No</label>
      <input type="number" name="rollNo" [(ngModel)]="student.rollNo"
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
    </div>

    <!-- Name -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Name</label>
      <input type="text" name="name" [(ngModel)]="student.name"
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
    </div>

    <!-- Standard -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Standard</label>
      <input type="number" name="standard" [(ngModel)]="student.standard"
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
    </div>

    <!-- School -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">School</label>
      <input type="text" name="school" [(ngModel)]="student.school"
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
    </div>

    <!-- Gender -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Gender</label>
      <select name="gender" [(ngModel)]="student.gender"
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition">
        <option value="" disabled>Select Gender</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
      </select>
    </div>

    <!-- Percentage -->
    <div>
      <label class="block text-gray-700 font-semibold">Percentage</label>
      <input type="number" name="percentage" [(ngModel)]="student.percentage"
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
    </div>

    <!-- Buttons -->
    <div class="col-span-1 sm:col-span-2 flex flex-col sm:flex-row justify-end gap-3">
      <button type="button" (click)="cancel()"
        class="w-full sm:w-auto px-6 py-2 rounded-lg bg-red-400 text-white font-medium shadow-sm hover:bg-red-500 hover:shadow-md active:scale-[0.98] transition-all duration-200">
        Cancel
      </button>
      <button type="submit"
        class="w-full sm:w-auto px-6 py-2 rounded-lg bg-green-600 text-white font-medium shadow-sm hover:bg-green-700 hover:shadow-md active:scale-[0.98] transition-all duration-200">
        Update
      </button>
    </div>

  </form>
</div>
