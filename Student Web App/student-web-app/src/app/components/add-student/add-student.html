<div class="flex flex-1 flex-col items-center justify-start w-full h-full p-4 sm:p-6 bg-gradient-to-br from-gray-50 via-gray-100 to-gray-50 overflow-auto">

  <h2 class="text-2xl sm:text-3xl font-extrabold text-indigo-600 mb-2 text-center tracking-tight">
    Add New Student
  </h2>

  <form class="w-full max-w-4xl bg-white/95 backdrop-blur-md rounded-2xl shadow-xl border border-gray-100 p-2 sm:p-8 grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-6">

    <!-- Registration No -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Registration No</label>
      <input type="text" [(ngModel)]="student.regNo" name="regNo" required
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" 
        placeholder="Enter registration number" />
    </div>

    <!-- Roll No -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Roll No</label>
      <input type="number" [(ngModel)]="student.rollNo" name="rollNo" required
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" 
        placeholder="Enter roll number" />
    </div>

    <!-- Name -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Name</label>
      <input type="text" [(ngModel)]="student.name" name="name" required 
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" 
        placeholder="Enter student name" />
    </div>

    <!-- Standard -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Standard</label>
      <input type="number" [(ngModel)]="student.standard" name="standard" required
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" 
        placeholder="Enter standard/class" />
    </div>

    <!-- School -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">School</label>
      <input type="text" [(ngModel)]="student.school" name="school" required
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" 
        placeholder="Enter school name" />
    </div>

    <!-- Gender -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Gender</label>
      <select [(ngModel)]="student.gender" name="gender" required
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition">
        <option value="" selected disabled>Select Gender</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
      </select>
    </div>

    <!-- Percentage -->
    <div>
      <label class="block text-gray-700 font-semibold mb-1">Percentage</label>
      <input type="number" [(ngModel)]="student.percentage" name="percentage" required
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" 
        placeholder="Enter percentage" />
    </div>

    <!-- Action Buttons -->
    <div class="col-span-1 sm:col-span-2 flex flex-col sm:flex-row justify-end gap-3">
      <button type="button" (click)="cancel()"
        class="w-full sm:w-auto px-6 py-2 rounded-lg bg-red-400 text-white font-medium shadow-sm hover:bg-red-500 hover:shadow-md active:scale-[0.98] transition-all duration-200">
        Cancel
      </button>
      <button type="button" (click)="addStudent()"
        class="w-full sm:w-auto px-6 py-2 rounded-lg bg-green-600 text-black font-medium shadow-sm hover:bg-green-700 hover:shadow-md active:scale-[0.98] transition-all duration-200">
        Add
      </button>
    </div>

  </form>
</div>
