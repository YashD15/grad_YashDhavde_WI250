<div class="flex flex-1 items-center justify-center w-full h-full bg-gradient-to-br from-gray-100 via-gray-50 to-gray-200 p-6">

  <div class="w-full max-w-md bg-white/90 backdrop-blur rounded-2xl shadow-xl border border-gray-100 p-8 transition-all duration-300 hover:shadow-2xl">

    <h2 class="text-3xl font-bold text-center text-gray-800 mb-8 tracking-tight">
      Welcome Back
    </h2>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-5">

      <!-- Username -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Username
        </label>
        <input 
          type="username"
          name="username"
          [(ngModel)]="loginData.username"
          required
          class="w-full px-4 py-2.5 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
          placeholder="Enter your username"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Password
        </label>
        <input 
          type="password"
          name="password"
          [(ngModel)]="loginData.password"
          required
          class="w-full px-4 py-2.5 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
          placeholder="Enter your password"
        />
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="w-full py-2.5 rounded-lg bg-blue-500 text-white font-medium shadow-sm hover:bg-blue-600 hover:shadow-md active:scale-[0.98] transition-all duration-200"
      >
        Login
      </button>

      <!-- Cancel Button -->
      <button
        routerLink="/"
        type="button"
        class="w-full py-2.5 rounded-lg bg-amber-500 text-white font-medium shadow-sm hover:bg-amber-600 hover:shadow-md active:scale-[0.98] transition-all duration-200"
      >
        Cancel
      </button>

    </form>

  </div>

</div>
