<div class="min-h-screen flex flex-col items-center justify-center bg-gray-50">
  <h1 class="text-4xl font-bold text-indigo-600 mb-8">Student Management System</h1>

  <div class="flex space-x-6">
    <!-- Login Page Button -->
    <button
      class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow hover:bg-indigo-700 transition"
      (click)="navigateToLogin()"
    >
      Login Page
    </button>

    <!-- Get Details Button -->
    <button
      class="px-6 py-3 bg-teal-500 text-white font-semibold rounded-lg shadow hover:bg-teal-600 transition"
      (click)="getDetails()"
    >
      Get Details
    </button>
  </div>
</div>
