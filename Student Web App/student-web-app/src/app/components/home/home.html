<div class="flex flex-col flex-1 w-full h-full items-center justify-center bg-gray-50 px-4">

  <h1 class="text-3xl sm:text-4xl font-bold text-indigo-600 mb-8 text-center">
    Student Management System
  </h1>

  <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full sm:w-auto">

    <button
      class="w-full sm:w-auto px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow hover:bg-indigo-700 transition"
      (click)="toDashboard()"
    >
      Dashboard
    </button>

    <button
      class="w-full sm:w-auto px-6 py-3 bg-teal-500 text-white font-semibold rounded-lg shadow hover:bg-teal-600 transition"
      (click)="getDetails()"
    >
      Get Details
    </button>

  </div>

</div>
