<div class="flex flex-1 flex-col items-center justify-start w-full h-full p-2 sm:p-4 lg:p-6 bg-gradient-to-br from-gray-50 via-gray-100 to-gray-50 overflow-auto">

  <h2 class="text-2xl sm:text-3xl font-extrabold text-indigo-600 mb-2 sm:mb-6 text-center tracking-tight">
    Search Student by Registration No.
  </h2>

  <!-- Search Form -->
  <form (ngSubmit)="searchStudent(regNo)" class="w-full max-w-md bg-white/95 backdrop-blur-md rounded-xl shadow-lg border border-gray-100 p-2 sm:p-6 flex flex-col space-y-3 sm:space-y-4">
    <label class="block text-gray-700 font-semibold">Registration No</label>
    <input type="text" [(ngModel)]="regNo" name="regNo" required
      placeholder="Enter registration number"
      class="w-full px-3 py-2 sm:px-4 sm:py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition" />
    <button type="submit"
      class="w-full px-5 py-2 sm:px-6 sm:py-2 bg-indigo-600 text-white font-medium rounded-lg shadow-sm hover:bg-indigo-700 hover:shadow-md transition-all duration-200">
      Search
    </button>
    <button type="button"
      class="w-full px-5 py-2 sm:px-6 sm:py-2 bg-yellow-600 text-white font-medium rounded-lg shadow-sm hover:bg-yellow-700 hover:shadow-md transition-all duration-200"
      routerLink="/">
      Cancel
    </button>
  </form>

  <!-- Student Details Card -->
  <div *ngIf="student" class="w-full max-w-4xl bg-white/95 backdrop-blur-md rounded-xl shadow-lg border border-gray-100 mt-4 sm:mt-6 p-4 sm:p-6 grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">

    <div>
      <label class="block text-gray-700 font-semibold mb-1">Registration No</label>
      <div class="px-3 py-2 rounded-lg bg-gray-50 border border-gray-300">{{ student.regNo }}</div>
    </div>

    <div>
      <label class="block text-gray-700 font-semibold mb-1">Roll No</label>
      <div class="px-3 py-2 rounded-lg bg-gray-50 border border-gray-300">{{ student.rollNo }}</div>
    </div>

    <div>
      <label class="block text-gray-700 font-semibold mb-1">Name</label>
      <div class="px-3 py-2 rounded-lg bg-gray-50 border border-gray-300">{{ student.name }}</div>
    </div>

    <div>
      <label class="block text-gray-700 font-semibold mb-1">Standard</label>
      <div class="px-3 py-2 rounded-lg bg-gray-50 border border-gray-300">{{ student.standard }}</div>
    </div>

    <div>
      <label class="block text-gray-700 font-semibold mb-1">School</label>
      <div class="px-3 py-2 rounded-lg bg-gray-50 border border-gray-300">{{ student.school }}</div>
    </div>

    <div>
      <label class="block text-gray-700 font-semibold mb-1">Gender</label>
      <div class="px-3 py-2 rounded-lg bg-gray-50 border border-gray-300">{{ student.gender }}</div>
    </div>

    <div>
      <label class="block text-gray-700 font-semibold mb-1">Percentage</label>
      <div class="px-3 py-2 rounded-lg border border-gray-300 font-semibold"
           [ngClass]="student.percentage < 40 ? 'text-red-500' : 'text-green-500'">
        {{ student.percentage }}%
      </div>
    </div>

  </div>

  <!-- Student Not Found -->
  <div *ngIf="!student && searched" class="w-full max-w-md bg-red-50 text-red-600 border border-red-200 rounded-lg p-3 mt-4 text-center font-semibold">
    Student with Registration No "{{ regNo }}" not found.
  </div>

</div>
