<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OUR BANK Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="MyStyle.css">
    <script src="MyScript.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header class="bg-primary text-white text-center py-3">
        <h1 class="mb-0">🏦 OUR BANK 🏦</h1>
        <p class="mb-0">Banking at your Doorstep</p>
    </header>

    <!-- MAIN -->
    <main class="container-fluid flex-grow-1">
        <div class="row h-100">

        <!-- Desktop Sidebar -->
        <nav class="col-md-3 col-lg-2 d-none d-md-block bg-light sidebar pt-3">
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" onclick="home()">🏠 Home</a></li>
                <li class="nav-item"><a class="nav-link" onclick="services()">💼 Services</a></li>
                <li class="nav-item"><a class="nav-link" onclick="netbanking()">💻 Net Banking</a></li>
                <li class="nav-item"><a class="nav-link" onclick="contact()">📞 Contact Us</a></li>
                <li class="nav-item"><a class="nav-link" onclick="about()">ℹ About Us</a></li>
            </ul>
        </nav>

        <!-- Mobile Top Bar -->
        <div class="d-md-none bg-light p-2">
            <button class="btn btn-primary"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#mobileSidebar">
                ☰ Menu
            </button>
        </div>

        <!-- Offcanvas Mobile Sidebar -->
        <div class="offcanvas offcanvas-start" id="mobileSidebar">
            <div class="offcanvas-header">
                <h5>🏦 OUR BANK 🏦</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <ul class="nav flex-column">
                    <li><a class="nav-link" onclick="home()" data-bs-dismiss="offcanvas">🏠 Home</a></li>
                    <li><a class="nav-link" onclick="services()" data-bs-dismiss="offcanvas">💼 Services</a></li>
                    <li><a class="nav-link" onclick="netbanking()" data-bs-dismiss="offcanvas">💻 Net Banking</a></li>
                    <li><a class="nav-link" onclick="contact()" data-bs-dismiss="offcanvas">📞 Contact Us</a></li>
                    <li><a class="nav-link" onclick="about()" data-bs-dismiss="offcanvas">ℹ About Us</a></li>
                </ul>
            </div>
        </div>

        <!-- Dynamic Section -->
        <section class="col-md-9 col-lg-10 p-4 overflow-auto" id="mainSection"></section>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-primary text-white text-center py-3">
        <div>www.ourbank.com</div>
        <div>© Copyright. All rights reserved.</div>
    </footer>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3">
      <div id="liveToast" class="toast" role="alert">
        <div class="toast-header">
          <strong class="me-auto" id="toastHead"></strong>
          <small id="toastTime"></small>
          <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="toastMessage"></div>
      </div>
    </div>

</body>
</html>
